apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.name }}-dev
  labels:
    app: ${{ values.name }}
    dxp.io/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
        backstage.io/kubernetes-id: ${{ values.name }}
    spec:
      nodeSelector:
        role: workload
      tolerations:
      - key: role
        operator: Equal
        value: workload
        effect: NoSchedule
      containers:
      - name: ${{ values.name }}
        image: harbor.dxp/dxp/${{ values.name }}:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.name }}-dev
spec:
  selector:
    app: ${{ values.name }}
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP